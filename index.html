<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Single Task Worker</title>
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="集中" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'%3E%3Crect width='128' height='128' rx='24' fill='%23000'/%3E%3Ctext x='64' y='80' text-anchor='middle' font-size='42' font-weight='800' fill='%23fff' font-family='serif'%3E集中%3C/text%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%23000'/%3E%3Ctext x='90' y='118' text-anchor='middle' font-size='62' font-weight='800' fill='%23fff' font-family='serif'%3E集中%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --text: #f0f0f0;
      --text-2: #888;
      --text-3: #3d3d3d;
      --text-meta: #4a4a4a;
      --line: #161616;
      --surface: #0a0a0a;
      --tap: 44px;
      --serif: "Hiragino Mincho ProN", "YuMincho", "Yu Mincho", "Times New Roman", Georgia, serif;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    body {
      padding: max(28px, env(safe-area-inset-top))
               max(20px, env(safe-area-inset-right))
               max(40px, env(safe-area-inset-bottom))
               max(20px, env(safe-area-inset-left));
    }

    button, input { font: inherit; color: inherit; }

    .app { max-width: 720px; margin: 0 auto; }

    /* ========= Header ========= */
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .brand {
      font-family: var(--serif);
      font-size: 13px;
      letter-spacing: 0.05em;
      color: var(--text-2);
    }

    .brand .mark {
      color: var(--text);
      font-size: 17px;
      margin-right: 8px;
      letter-spacing: 0.08em;
    }

    .brand .dot {
      margin: 0 8px;
      color: var(--text-3);
    }

    .top-actions {
      display: flex;
      gap: 2px;
    }

    .top-actions button {
      background: transparent;
      border: none;
      color: var(--text-2);
      padding: 8px 12px;
      font-size: 12px;
      letter-spacing: 0.04em;
      cursor: pointer;
      border-radius: 6px;
      transition: color .15s, background .15s;
    }

    .top-actions button:hover:not(:disabled) {
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }

    .top-actions button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .top-actions button.on {
      color: var(--text);
    }

    .top-actions button.on::before {
      content: "●";
      margin-right: 6px;
      font-size: 9px;
      vertical-align: middle;
    }

    /* ========= Composer ========= */
    .composer {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 8px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--line);
    }

    .composer input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      color: var(--text);
      padding: 14px 0 12px;
      font-size: 18px;
      font-family: var(--sans);
      outline: none;
      transition: border-color .2s;
    }

    .composer input:focus { border-bottom-color: var(--text-2); }
    .composer input::placeholder { color: var(--text-3); }

    .priority-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .priority-row .label {
      color: var(--text-3);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-right: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.05em;
      cursor: pointer;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text-2);
      transition: all .15s;
      min-height: 32px;
    }

    .chip:hover { border-color: var(--text-3); color: var(--text); }

    .chip.selected {
      background: var(--text);
      border-color: var(--text);
      color: #000;
    }

    .add-btn {
      background: transparent;
      border: 1px solid var(--text-2);
      color: var(--text);
      padding: 7px 18px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all .15s;
      min-height: 32px;
      margin-left: 8px;
    }

    .add-btn:hover { border-color: var(--text); color: var(--text); }

    /* ========= Tasks ========= */
    .tasks {
      display: flex;
      flex-direction: column;
    }

    .task {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 0;
      transition: background .2s, max-height .25s, opacity .25s,
                  padding .25s, margin .25s;
      max-height: 500px;
      overflow: hidden;
      position: relative;
    }

    .task:nth-child(1) {
      padding: 36px 0 36px;
      margin: 12px 0 16px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .task:nth-child(1) .task-title {
      font-family: var(--serif);
      font-size: clamp(30px, 6vw, 54px);
      font-weight: 700;
      color: var(--text);
      line-height: 1.18;
      letter-spacing: -0.01em;
    }

    .task:nth-child(2) .task-title,
    .task:nth-child(3) .task-title {
      font-size: clamp(17px, 3vw, 22px);
      font-weight: 500;
      color: var(--text-2);
      line-height: 1.4;
    }

    .task:nth-child(n+4) .task-title {
      font-size: clamp(13px, 1.6vw, 15px);
      font-weight: 400;
      color: var(--text-3);
      line-height: 1.45;
    }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      overflow-wrap: anywhere;
      position: relative;
    }

    .task-title::before {
      content: attr(data-title);
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      text-decoration: line-through;
      text-decoration-color: currentColor;
      clip-path: inset(0 100% 0 0);
      pointer-events: none;
    }

    .task-meta {
      margin-top: 8px;
      color: var(--text-meta);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .task:nth-child(n+4) .task-meta { display: none; }

    .complete {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--text-3);
      background: transparent;
      color: var(--text-3);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 13px;
      transition: border-color .15s, color .15s, transform .1s;
      padding: 0;
      margin-right: 7px;
    }

    .task:nth-child(1) .complete {
      width: 44px; height: 44px; font-size: 18px;
      margin-right: 0;
    }

    .complete:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .complete:active { transform: scale(0.92); }

    /* Completion effect */
    .task.completing {
      pointer-events: none;
      animation: complete-row .55s cubic-bezier(.5,0,.6,.2) forwards;
    }

    @keyframes complete-row {
      0%   { background: rgba(255,255,255,0.18); }
      45%  { background: rgba(255,255,255,0.06); max-height: 500px; opacity: 1; }
      100% {
        max-height: 0; opacity: 0;
        padding-top: 0; padding-bottom: 0;
        margin-top: 0; margin-bottom: 0;
        border-color: transparent;
        background: transparent;
      }
    }

    .task.completing .complete {
      animation: complete-pop .35s ease forwards;
    }

    @keyframes complete-pop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.5); border-color: var(--text); background: var(--text); color: #000; }
      100% { transform: scale(0.6); opacity: 0; }
    }

    .task.completing .task-title::before {
      animation: strike-reveal .42s linear forwards;
    }

    @keyframes strike-reveal {
      to { clip-path: inset(0 0 0 0); }
    }

    /* Burst particles on the complete button */
    .burst {
      position: absolute;
      pointer-events: none;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text);
      animation: burst .35s ease-out forwards;
    }

    @keyframes burst {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: var(--burst-end) scale(0); opacity: 0; }
    }

    /* Body-level overlay that mirrors the button's pop animation,
       so the expanding circle isn't clipped by .task { overflow: hidden } */
    .pop-ring {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      border: 1px solid var(--text-3);
      background: transparent;
      box-sizing: border-box;
      animation: pop-ring .35s ease forwards;
    }

    @keyframes pop-ring {
      0%   { transform: scale(1); border-color: var(--text-3); background: transparent; opacity: 1; }
      45%  { transform: scale(1.5); border-color: var(--text); background: var(--text); opacity: 1; }
      100% { transform: scale(0.6); border-color: var(--text); background: var(--text); opacity: 0; }
    }

    /* Empty state */
    .empty {
      padding: 80px 20px;
      text-align: center;
      color: var(--text-3);
      font-family: var(--serif);
      font-size: 17px;
      letter-spacing: 0.04em;
    }

    /* ========= Splash ========= */
    .splash {
      min-height: 78vh;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .splash-mark {
      font-family: var(--serif);
      font-size: clamp(56px, 12vw, 96px);
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .splash-sub {
      color: var(--text-3);
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      margin-bottom: 44px;
    }

    .signin {
      background: var(--text);
      color: #000;
      border: none;
      padding: 14px 30px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }

    .signin:hover { opacity: 0.85; }
    .signin:active { transform: scale(0.98); }
    .signin:disabled { opacity: 0.35; cursor: not-allowed; }

    .splash-status {
      margin-top: 22px;
      color: var(--text-3);
      font-size: 11px;
      letter-spacing: 0.04em;
      max-width: 360px;
      line-height: 1.5;
      margin-left: auto;
      margin-right: auto;
    }

    /* ========= Archive Dialog ========= */
    dialog {
      margin: auto;
      width: min(640px, calc(100% - 32px));
      max-height: calc(100vh - 60px);
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      padding: 0;
      box-shadow: 0 30px 80px rgba(0,0,0,.7);
    }

    dialog::backdrop {
      background: rgba(0,0,0,.85);
      backdrop-filter: blur(6px);
    }

    .archive-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
    }

    .archive-head h2 {
      font-family: var(--serif);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-2);
      margin: 0;
    }

    .archive-head .close-btn {
      background: transparent;
      border: none;
      color: var(--text-2);
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.05em;
      padding: 6px 10px;
      border-radius: 4px;
    }

    .archive-head .close-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }

    .archive-list {
      max-height: 60vh;
      overflow-y: auto;
      padding: 6px 0;
    }

    .archived-task {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      color: var(--text-2);
      font-size: 14px;
      border-bottom: 1px solid transparent;
      transition: background .15s;
    }

    .archived-task + .archived-task {
      border-top: 1px solid var(--line);
    }

    .archived-task:hover {
      background: rgba(255,255,255,0.02);
    }

    .archived-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    .archived-info .archived-title {
      overflow-wrap: anywhere;
      color: var(--text-2);
    }

    .archived-info .archived-meta {
      font-size: 10px;
      color: var(--text-meta);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .restore {
      background: transparent;
      border: 1px solid var(--text-3);
      color: var(--text-2);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
    }

    .restore:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .archive-empty {
      padding: 60px 24px;
      text-align: center;
      color: var(--text-3);
      font-family: var(--serif);
      font-size: 14px;
    }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .top {
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
      }
      .top-actions { margin-left: -8px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="splash" class="splash hidden">
      <div>
        <div class="splash-mark">集中</div>
        <div class="splash-sub">Single Task Worker</div>
        <button id="signinBtn" class="signin" type="button">Google でサインイン</button>
        <p id="splashStatus" class="splash-status"></p>
      </div>
    </section>

    <div id="appView" class="hidden">
      <div class="top">
        <div class="brand">
          <span class="mark">集中</span><span id="summary">読み込み中</span>
        </div>
        <div class="top-actions">
          <button id="pipBtn" type="button">Floating</button>
          <button id="archiveBtn" type="button">Archive</button>
          <button id="signoutBtn" type="button">Sign out</button>
        </div>
      </div>

      <form class="composer" id="taskForm" autocomplete="off">
        <input id="taskInput" type="text" placeholder="今やることを書く" required />
        <div class="priority-row">
          <span class="label">優先順位</span>
          <button type="button" class="chip" data-priority="urgent">緊急</button>
          <button type="button" class="chip selected" data-priority="high">高</button>
          <button type="button" class="chip" data-priority="low">低</button>
          <button type="submit" class="add-btn">追加</button>
        </div>
      </form>

      <section class="tasks" id="tasks" aria-live="polite"></section>
    </div>
  </main>

  <dialog id="archiveDialog">
    <div class="archive-head">
      <h2>Archive</h2>
      <button id="closeArchiveBtn" class="close-btn" type="button">Close</button>
    </div>
    <div class="archive-list" id="archiveList"></div>
  </dialog>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect,
      getRedirectResult, onAuthStateChanged, signOut
    } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import {
      initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
      collection, onSnapshot, addDoc, updateDoc, doc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBN8-3VgmoSIYwLue5SUw-odPFbzu90yuo",
      authDomain: "single-task-worker.firebaseapp.com",
      projectId: "single-task-worker",
      storageBucket: "single-task-worker.firebasestorage.app",
      messagingSenderId: "866635936867",
      appId: "1:866635936867:web:6e507aaf9f7df8015fb456"
    };

    const PRIORITY_RANK = { urgent: 0, high: 1, low: 2 };
    const PRIORITY_LABEL = { urgent: "緊急", high: "高", low: "低" };

    const PIP_CSS = `
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; background: #000; color: #fff; }
      body { display: grid; place-items: center; padding: 22px;
             font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", system-ui, sans-serif; }
      .box { width: 100%; }
      .label { color: #555; font-size: 10px; margin-bottom: 10px;
               letter-spacing: 0.22em; text-transform: uppercase; }
      .task { color: #fff; font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
              font-size: 26px; font-weight: 700; line-height: 1.18;
              letter-spacing: -0.005em; overflow-wrap: anywhere; }
      .empty { color: #444; font-size: 14px;
               font-family: "Hiragino Mincho ProN", "Yu Mincho", serif; }
    `;

    const els = {
      splash: document.querySelector("#splash"),
      splashStatus: document.querySelector("#splashStatus"),
      signinBtn: document.querySelector("#signinBtn"),
      appView: document.querySelector("#appView"),
      summary: document.querySelector("#summary"),
      form: document.querySelector("#taskForm"),
      input: document.querySelector("#taskInput"),
      tasks: document.querySelector("#tasks"),
      archiveBtn: document.querySelector("#archiveBtn"),
      archiveDialog: document.querySelector("#archiveDialog"),
      closeArchiveBtn: document.querySelector("#closeArchiveBtn"),
      archiveList: document.querySelector("#archiveList"),
      pipBtn: document.querySelector("#pipBtn"),
      signoutBtn: document.querySelector("#signoutBtn"),
      chips: document.querySelectorAll(".chip"),
    };

    const isConfigured = !firebaseConfig.apiKey.startsWith("YOUR_");
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const isStandalone =
      window.matchMedia("(display-mode: standalone)").matches ||
      window.navigator.standalone === true;
    // Standalone (PWA) mode can't use popups; everywhere else, prefer popup
    // because Safari's ITP can break cross-domain redirect auth on GitHub Pages.
    const useRedirect = isStandalone;
    const pipSupported = "documentPictureInPicture" in window;

    let app, auth, db, unsubscribe = null, currentUid = null;
    let activeTasks = [];
    let archivedTasks = [];
    let pipWindow = null;
    let pipLabelEl = null;
    let pipBodyEl = null;
    let closingPipProgrammatically = false;
    let floatingMode = localStorage.getItem("stw:floating") === "1";
    let selectedPriority = "high";

    if (!isConfigured) {
      els.splash.classList.remove("hidden");
      els.splashStatus.textContent =
        "index.html の firebaseConfig を Firebase Console の設定で書き換えてください。";
      els.signinBtn.disabled = true;
    } else {
      bootstrap();
    }

    function bootstrap() {
      app = initializeApp(firebaseConfig);
      db = initializeFirestore(app, {
        localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }),
      });
      auth = getAuth(app);

      getRedirectResult(auth).catch((error) => {
        console.warn("Redirect sign-in failed", error);
      });

      onAuthStateChanged(auth, (user) => {
        if (user) onSignedIn(user);
        else onSignedOut();
      });

      els.signinBtn.addEventListener("click", handleSignIn);
      els.signoutBtn.addEventListener("click", () => signOut(auth));
      els.form.addEventListener("submit", handleAdd);
      els.archiveBtn.addEventListener("click", () => els.archiveDialog.showModal());
      els.closeArchiveBtn.addEventListener("click", () => els.archiveDialog.close());
      els.archiveDialog.addEventListener("click", (e) => {
        if (e.target === els.archiveDialog) els.archiveDialog.close();
      });

      els.pipBtn.addEventListener("click", toggleFloating);
      document.addEventListener("visibilitychange", onVisibilityChange);

      els.chips.forEach((chip) => {
        chip.addEventListener("click", () => {
          els.chips.forEach((c) => c.classList.remove("selected"));
          chip.classList.add("selected");
          selectedPriority = chip.dataset.priority;
          if (els.input.value.trim()) els.input.focus();
        });
      });

      if (!pipSupported) {
        els.pipBtn.disabled = true;
        els.pipBtn.title =
          "Document Picture-in-Picture に未対応（Chrome デスクトップ最新版で利用可）";
      }
      renderPipButton();
    }

    async function handleSignIn() {
      els.signinBtn.disabled = true;
      els.splashStatus.textContent = "サインイン中…";
      try {
        const provider = new GoogleAuthProvider();
        if (useRedirect) await signInWithRedirect(auth, provider);
        else await signInWithPopup(auth, provider);
      } catch (error) {
        console.warn("Sign-in failed", error);
        els.splashStatus.textContent =
          "サインインに失敗しました: " + (error.message || error.code);
        els.signinBtn.disabled = false;
      }
    }

    function onSignedIn(user) {
      currentUid = user.uid;
      els.splash.classList.add("hidden");
      els.appView.classList.remove("hidden");
      subscribeTasks();
    }

    function onSignedOut() {
      currentUid = null;
      if (unsubscribe) { unsubscribe(); unsubscribe = null; }
      activeTasks = [];
      archivedTasks = [];
      els.appView.classList.add("hidden");
      els.splash.classList.remove("hidden");
      els.signinBtn.disabled = !isConfigured;
      els.splashStatus.textContent = "";
      closePipProgrammatic();
    }

    function subscribeTasks() {
      const ref = collection(db, "users", currentUid, "tasks");
      unsubscribe = onSnapshot(ref, (snap) => {
        const all = [];
        snap.forEach((d) => all.push({ id: d.id, ...d.data() }));
        activeTasks = all
          .filter((t) => !t.archivedAt)
          .sort((a, b) => {
            const p = PRIORITY_RANK[a.priority] - PRIORITY_RANK[b.priority];
            if (p !== 0) return p;
            const at = a.createdAt?.toMillis?.() ?? 0;
            const bt = b.createdAt?.toMillis?.() ?? 0;
            return at - bt;
          });
        archivedTasks = all
          .filter((t) => t.archivedAt)
          .sort((a, b) =>
            (b.archivedAt?.toMillis?.() ?? 0) - (a.archivedAt?.toMillis?.() ?? 0));
        render();
      }, (error) => {
        console.warn("snapshot error", error);
      });
    }

    async function handleAdd(event) {
      event.preventDefault();
      const title = els.input.value.trim();
      if (!title || !currentUid) return;
      els.input.value = "";
      els.input.focus();
      try {
        await addDoc(collection(db, "users", currentUid, "tasks"), {
          title,
          priority: selectedPriority,
          createdAt: serverTimestamp(),
          archivedAt: null,
        });
      } catch (error) {
        console.warn("add failed", error);
      }
    }

    async function archiveTask(id, rowEl) {
      if (rowEl) {
        const btn = rowEl.querySelector(".complete");
        rowEl.classList.add("completing");
        spawnPopRing(btn);
        spawnBurst(btn);
        await new Promise((r) => setTimeout(r, 520));
      }
      try {
        await updateDoc(doc(db, "users", currentUid, "tasks", id), {
          archivedAt: serverTimestamp(),
        });
      } catch (error) {
        console.warn("archive failed", error);
      }
    }

    function spawnPopRing(target) {
      if (!target) return;
      const rect = target.getBoundingClientRect();
      const ring = document.createElement("div");
      ring.className = "pop-ring";
      ring.style.left = (rect.left + window.scrollX) + "px";
      ring.style.top = (rect.top + window.scrollY) + "px";
      ring.style.width = rect.width + "px";
      ring.style.height = rect.height + "px";
      document.body.append(ring);
      setTimeout(() => ring.remove(), 400);
    }

    function spawnBurst(target) {
      if (!target) return;
      const rect = target.getBoundingClientRect();
      const cx = rect.left + rect.width / 2 + window.scrollX;
      const cy = rect.top + rect.height / 2 + window.scrollY;
      const N = 8;
      for (let i = 0; i < N; i++) {
        const dot = document.createElement("div");
        dot.className = "burst";
        const angle = (Math.PI * 2 * i) / N + Math.random() * 0.3;
        const dist = 36 + Math.random() * 14;
        dot.style.left = cx - 3 + "px";
        dot.style.top = cy - 3 + "px";
        dot.style.position = "absolute";
        dot.style.setProperty(
          "--burst-end",
          `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`
        );
        document.body.append(dot);
        setTimeout(() => dot.remove(), 400);
      }
    }

    async function restoreTask(id) {
      try {
        await updateDoc(doc(db, "users", currentUid, "tasks", id), {
          archivedAt: null,
        });
      } catch (error) {
        console.warn("restore failed", error);
      }
    }

    function render() {
      const n = activeTasks.length;
      const a = archivedTasks.length;
      els.summary.textContent =
        n === 0 && a === 0
          ? "no tasks"
          : `${n} active${a ? ` · ${a} archived` : ""}`;
      els.tasks.replaceChildren();

      if (n === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "ひとつだけ書く。";
        els.tasks.append(empty);
      } else {
        for (const task of activeTasks) {
          els.tasks.append(buildTaskRow(task));
        }
      }
      renderArchive();
      renderPip();
    }

    function buildTaskRow(task) {
      const row = document.createElement("article");
      row.className = "task";
      row.dataset.taskId = task.id;

      const body = document.createElement("div");
      body.className = "task-body";
      const title = document.createElement("div");
      title.className = "task-title";
      title.textContent = task.title;
      title.dataset.title = task.title;
      body.append(title);

      const meta = document.createElement("div");
      meta.className = "task-meta";
      const parts = [PRIORITY_LABEL[task.priority] ?? task.priority];
      if (task.createdAt?.toDate) parts.push(formatDate(task.createdAt.toDate()));
      meta.textContent = parts.join("  ·  ");
      body.append(meta);

      const done = document.createElement("button");
      done.className = "complete";
      done.type = "button";
      done.title = "完了";
      done.setAttribute("aria-label", `${task.title} を完了`);
      done.textContent = "✓";
      done.addEventListener("click", () => archiveTask(task.id, row));

      row.append(body, done);
      return row;
    }

    function renderArchive() {
      els.archiveList.replaceChildren();
      if (archivedTasks.length === 0) {
        const empty = document.createElement("div");
        empty.className = "archive-empty";
        empty.textContent = "アーカイブは空です。";
        els.archiveList.append(empty);
        return;
      }
      for (const task of archivedTasks) {
        const row = document.createElement("article");
        row.className = "archived-task";

        const info = document.createElement("div");
        info.className = "archived-info";
        const title = document.createElement("div");
        title.className = "archived-title";
        title.textContent = task.title;
        const m = document.createElement("div");
        m.className = "archived-meta";
        const parts = [PRIORITY_LABEL[task.priority] ?? task.priority];
        if (task.archivedAt?.toDate) parts.push(formatDate(task.archivedAt.toDate()));
        m.textContent = parts.join("  ·  ");
        info.append(title, m);

        const restore = document.createElement("button");
        restore.className = "restore";
        restore.type = "button";
        restore.textContent = "Restore";
        restore.addEventListener("click", () => restoreTask(task.id));

        row.append(info, restore);
        els.archiveList.append(row);
      }
    }

    function formatDate(date) {
      return new Intl.DateTimeFormat("ja-JP", {
        month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit",
      }).format(date);
    }

    /* ========= Floating / PiP ========= */
    function renderPipButton() {
      els.pipBtn.classList.toggle("on", floatingMode);
      els.pipBtn.textContent = "Floating";
    }

    async function toggleFloating() {
      if (floatingMode) {
        setFloatingMode(false);
        closePipProgrammatic();
      } else {
        setFloatingMode(true);
        await ensurePipOpen();
      }
    }

    function setFloatingMode(on) {
      floatingMode = on;
      localStorage.setItem("stw:floating", on ? "1" : "0");
      renderPipButton();
    }

    async function ensurePipOpen() {
      if (!pipSupported) return false;
      if (pipWindow && !pipWindow.closed) return true;
      try {
        pipWindow = await documentPictureInPicture.requestWindow({
          width: 360, height: 180,
        });
        buildPipDocument(pipWindow.document);
        renderPip();
        pipWindow.addEventListener("pagehide", onPipPageHide);
        return true;
      } catch (error) {
        console.warn("PiP open failed (likely no user activation)", error);
        return false;
      }
    }

    function buildPipDocument(pipDoc) {
      pipDoc.title = "集中";
      const style = pipDoc.createElement("style");
      style.textContent = PIP_CSS;
      pipDoc.head.append(style);

      const box = pipDoc.createElement("div");
      box.className = "box";

      pipLabelEl = pipDoc.createElement("div");
      pipLabelEl.className = "label";
      pipLabelEl.textContent = "Now";

      pipBodyEl = pipDoc.createElement("div");

      box.append(pipLabelEl, pipBodyEl);
      pipDoc.body.replaceChildren(box);
    }

    function closePipProgrammatic() {
      if (!pipWindow || pipWindow.closed) return;
      closingPipProgrammatically = true;
      try { pipWindow.close(); } catch {}
    }

    function onPipPageHide() {
      const wasProgrammatic = closingPipProgrammatically;
      closingPipProgrammatically = false;
      pipWindow = null;
      pipLabelEl = null;
      pipBodyEl = null;
      if (!wasProgrammatic && floatingMode) {
        // user closed PiP manually -> turn off mode
        setFloatingMode(false);
      }
    }

    function renderPip() {
      if (!pipWindow || pipWindow.closed || !pipBodyEl) return;
      const current = activeTasks[0];
      pipBodyEl.className = current ? "task" : "empty";
      pipBodyEl.textContent = current ? current.title : "no task";
    }

    async function onVisibilityChange() {
      if (!floatingMode) return;
      if (document.visibilityState === "hidden") {
        await ensurePipOpen();
      } else {
        closePipProgrammatic();
      }
    }
  </script>
</body>
</html>
